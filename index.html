<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timezone App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <button class="theme-btn" id="themeBtn" title="Toggle theme (T)" aria-label="Toggle theme">🌙</button>

  <div class="app" id="app">
    <header class="header">
      <h1 class="logo">🕐 World Clock</h1>
      <p class="tagline">Track time across the globe</p>
    </header>

    <!-- Local time hero -->
    <section class="local-time" id="localTime">
      <div class="local-analog" id="localAnalog">
        <div class="analog-clock analog-clock-lg">
          <div class="clock-hand clock-hand-hour" id="localHourHand"></div>
          <div class="clock-hand clock-hand-minute" id="localMinuteHand"></div>
          <div class="clock-hand clock-hand-second" id="localSecondHand"></div>
          <div class="clock-center-dot"></div>
          <div class="clock-markers" id="localMarkers"></div>
        </div>
      </div>
      <div class="local-clock">
        <span class="local-time-display" id="localTimeDisplay">--:--:--</span>
        <span class="local-date" id="localDate">---</span>
      </div>
      <p class="local-tz" id="localTz">--</p>
      <button class="format-toggle" id="formatToggle" title="Toggle 12h/24h format" aria-label="Toggle time format">24h</button>
    </section>

    <!-- Search (SEN-371 enhanced) -->
    <div class="search-container" id="searchContainer">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input"
               placeholder="Search timezone or city... (/ to focus)" autocomplete="off"
               aria-label="Search for a timezone">
        <button class="browse-btn" id="browseBtn" title="Browse all timezones" aria-label="Browse timezones">🌐</button>
      </div>
      <ul class="search-results hidden" id="searchResults"></ul>
      <div class="browse-panel hidden" id="browsePanel">
        <div class="browse-tabs" id="browseTabs"></div>
        <ul class="browse-list" id="browseList"></ul>
      </div>
    </div>

    <div class="clock-count" id="clockCount"></div>

    <!-- Clock grid (SEN-370 will populate live clocks) -->
    <section class="clock-grid" id="clockGrid">
      <p class="empty-state" id="emptyState">Add timezones above to track world clocks</p>
    </section>

    <!-- Time converter (SEN-372) -->
    <section class="time-converter" id="timeConverter">
      <h3 class="section-title">🔄 Time Converter</h3>
      <div class="converter-card">
        <div class="converter-row">
          <!-- Source -->
          <div class="converter-zone">
            <label class="converter-label">From</label>
            <select id="converterFrom" class="converter-select" aria-label="Source timezone"></select>
            <div class="converter-time-input">
              <input type="time" id="converterTimeInput" class="converter-time" value="12:00" aria-label="Time to convert">
              <input type="date" id="converterDateInput" class="converter-date" aria-label="Date to convert">
            </div>
          </div>
          <!-- Swap -->
          <button class="converter-swap" id="converterSwap" title="Swap timezones" aria-label="Swap timezones">⇄</button>
          <!-- Target -->
          <div class="converter-zone">
            <label class="converter-label">To</label>
            <select id="converterTo" class="converter-select" aria-label="Target timezone"></select>
            <div class="converter-result" id="converterResult">
              <span class="converter-result-time" id="converterResultTime">--:--</span>
              <span class="converter-result-date" id="converterResultDate"></span>
              <span class="converter-result-shift" id="converterResultShift"></span>
            </div>
          </div>
        </div>
        <div class="converter-offsets" id="converterOffsets"></div>
      </div>
    </section>

    <!-- Settings export/import (SEN-373) -->
    <div class="settings-bar" id="settingsBar">
      <button class="settings-btn" id="exportBtn" title="Export settings">📤 Export</button>
      <label class="settings-btn" id="importLabel" title="Import settings">
        📥 Import
        <input type="file" id="importInput" accept=".json" class="hidden" aria-label="Import settings file">
      </label>
    </div>

    <footer class="footer">
      <p>All times use your browser's <a href="https://en.wikipedia.org/wiki/List_of_tz_database_time_zones" target="_blank" rel="noopener">IANA timezone database</a></p>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script src="timezone-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
